name: Publish artifacts on Release

on:
  release:
    types: [published]

defaults:
  run:
    shell: bash

permissions:
  contents: write # allows uploading release assets

jobs:
  generate_crd:
    name: Generate CRD
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Generate and Upload CRD
        run: |
          echo "Generating CRD"
          yq '.' crds/*.yaml > crd.yaml
          
          echo "Uploading CRD"
          file=crd.yaml
          upload_url="${{ github.event.release.upload_url }}"
          upload_url=${upload_url%%\{*\}}
          echo "Uploading $file to $upload_url ..."
          curl -sSf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: $(file -b --mime-type $file)" \
            --data-binary @$file \
            "$upload_url?name=$(basename $file)"

  extract-version:
    name: Extract version from tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.extract-version.outputs.version }}

    steps:
      - name: Extract version
        id: extract-version
        run: |
          version=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          echo "version=$version" >> $GITHUB_OUTPUT

  generate_sbom:
    name: Generate SBOM
    runs-on: ubuntu-24.04
    needs: extract-version
    strategy:
      matrix:
        workload: ["controller", "server", "web-hooks"]

    steps:
      - name: Wait for Docker image to be available
        id: wait-for-images
        timeout-minutes: 10
        run: |
          version=${{ needs.extract-version.outputs.version }}
          echo "Waiting for Docker image to be available"
          echo "Checking image: ghcr.io/${{ github.repository }}/${{ matrix.workload }}:$version"
          until curl -s -o /dev/null -w "%{http_code}" "https://ghcr.io/v2/${{ github.repository }}/${{ matrix.workload }}/manifests/$version" | grep -q "200"; do
            echo "Image ghcr.io/${{ github.repository }}/${{ matrix.workload }}:$version not available yet. Waiting..."
            sleep 10
          done
          echo "Image ghcr.io/${{ github.repository }}/${{ matrix.workload }}:$version is now available."

      - name: SBOM action (syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/${{ matrix.workload }}:${{ needs.extract-version.outputs.version }}
          artifact-name: sbom-${{ matrix.workload }}.spdx